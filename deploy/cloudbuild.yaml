# Cloud Build configuration for Costco Analytics Platform
# Builds and deploys both backend and frontend

steps:
  # Step 1: Build Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/costco-analytics-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/costco-analytics-api:latest'
      - '-f'
      - 'deploy/Dockerfile'
      - '.'
    id: 'build-backend'

  # Step 2: Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/costco-analytics-api:$COMMIT_SHA'
    id: 'push-backend'
    waitFor: ['build-backend']

  # Step 3: Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'costco-analytics-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/costco-analytics-api:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=${_REGION}'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # Step 4: Build Frontend
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['install']
    dir: 'frontend'
    id: 'install-frontend'

  - name: 'node:18'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'frontend'
    env:
      - 'VITE_API_URL=https://costco-analytics-api-${_REGION}-run.app'
    id: 'build-frontend'
    waitFor: ['install-frontend']

  # Step 5: Deploy Frontend to Firebase Hosting (optional)
  # Uncomment if using Firebase Hosting
  # - name: 'gcr.io/$PROJECT_ID/firebase'
  #   args: ['deploy', '--only', 'hosting']
  #   dir: 'frontend'
  #   id: 'deploy-frontend'
  #   waitFor: ['build-frontend']

substitutions:
  _REGION: 'us-central1'

images:
  - 'gcr.io/$PROJECT_ID/costco-analytics-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/costco-analytics-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
